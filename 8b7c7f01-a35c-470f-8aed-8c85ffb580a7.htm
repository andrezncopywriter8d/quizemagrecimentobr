  function findMainNumber(defaultValue) {

  function enhanceRuler() {
    var buttons = Array.prototype.slice.call(document.querySelectorAll('button'));
    var hasWeight = buttons.some(function (b) { return getButtonText(b) === 'kg'; }) && buttons.some(function (b) { return getButtonText(b) === 'lb'; });
    var hasHeight = buttons.some(function (b) { return getButtonText(b) === 'cm'; }) && buttons.some(function (b) { return getButtonText(b) === 'pol'; });
    if (!hasWeight && !hasHeight) return;
    var isTargetWeight = /eeed7a15/.test(getPathname());
    var config = hasHeight
      ? { key: 'quizHeight', unitKey: 'quizHeightUnit', min: 130, max: 210, value: 150, unit: 'cm', altUnit: 'pol', helper: 'Arraste para selecionar a sua altura' }
      : { key: isTargetWeight ? 'quizTargetWeight' : 'quizWeight', unitKey: isTargetWeight ? 'quizTargetWeightUnit' : 'quizWeightUnit', min: 45, max: 140, value: 75, unit: 'kg', altUnit: 'lb', helper: 'Arraste para selecionar o seu peso' };
    var value = parseInt(sessionStorage.getItem(config.key) || config.value, 10);
    var unit = sessionStorage.getItem(config.unitKey) || config.unit;
    var tickSpacing = 15;
    var numberNode = findMainNumber(value);
    var originalRoot = numberNode;
    for (var r = 0; originalRoot && originalRoot.parentElement && r < 4; r += 1) originalRoot = originalRoot.parentElement;
    if (!originalRoot) return;

    var enhanced = document.createElement('div');
    enhanced.className = 'quiz-ruler-enhanced quiz-ruler-zone';
    enhanced.innerHTML = '<div class="quiz-ruler-units"><button type="button" class="quiz-ruler-unit-button" data-quiz-unit="' + config.unit + '">' + config.unit + '</button><button type="button" class="quiz-ruler-unit-button" data-quiz-unit="' + config.altUnit + '">' + config.altUnit + '</button></div><div class="quiz-ruler-value"><span class="quiz-ruler-number"></span><span class="quiz-ruler-unit"></span></div><div class="quiz-ruler-track"><div class="quiz-ruler-ticks"></div><div class="quiz-ruler-pointer"><div class="quiz-ruler-pointer-line"></div><div class="quiz-ruler-pointer-diamond"></div></div></div><small class="quiz-ruler-helper"></small>';
    originalRoot.parentNode.insertBefore(enhanced, originalRoot);
    originalRoot.style.display = 'none';

    var unitButtons = Array.prototype.slice.call(enhanced.querySelectorAll('[data-quiz-unit]'));
    var numberEl = enhanced.querySelector('.quiz-ruler-number');
    var unitEl = enhanced.querySelector('.quiz-ruler-unit');
    var helperEl = enhanced.querySelector('.quiz-ruler-helper');
    var track = enhanced.querySelector('.quiz-ruler-track');
    var ticks = enhanced.querySelector('.quiz-ruler-ticks');
    helperEl.textContent = config.helper;
    for (var current = config.min; current <= config.max; current += 1) {
      var tick = document.createElement('div');
      tick.className = 'quiz-ruler-tick' + (current % 10 === 0 ? ' quiz-ruler-tick--major' : current % 5 === 0 ? ' quiz-ruler-tick--mid' : '');
      tick.style.left = ((current - config.min) * tickSpacing) + 'px';
      ticks.appendChild(tick);
      if (current % 10 === 0) {
        var label = document.createElement('span');
        label.className = 'quiz-ruler-label';
        label.style.left = ((current - config.min) * tickSpacing) + 'px';
        label.textContent = current;
        ticks.appendChild(label);
      }
    }

    function clamp(next) { return Math.max(config.min, Math.min(config.max, next)); }
    function render() {
      value = clamp(value);
      numberEl.textContent = value;
      unitEl.textContent = unit;
      var center = track.getBoundingClientRect().width / 2;
      ticks.style.transform = 'translateX(' + Math.round(center - ((value - config.min) * tickSpacing)) + 'px)';
      unitButtons.forEach(function (button) {
        var text = button.getAttribute('data-quiz-unit');
        if (text === unit) button.classList.add('quiz-unit-active'); else button.classList.remove('quiz-unit-active');
      });
      sessionStorage.setItem(config.key, String(value));
      sessionStorage.setItem(config.unitKey, unit);
    }

    var dragState = null;
    track.addEventListener('pointerdown', function (event) {
      event.preventDefault();
      dragState = { x: event.clientX, value: value };
      try { track.setPointerCapture(event.pointerId); } catch (error) {}
    });
    track.addEventListener('pointermove', function (event) {
      if (!dragState) return;
      value = clamp(dragState.value + Math.round((dragState.x - event.clientX) / tickSpacing));
      render();
    });
    track.addEventListener('pointerup', function () { dragState = null; });
    track.addEventListener('pointercancel', function () { dragState = null; });
    unitButtons.forEach(function (button) {
      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        unit = button.getAttribute('data-quiz-unit');
        render();
      }, clickListenerOptions);
    });
    window.addEventListener('resize', render, resizeListenerOptions);
    render();
  }

  function findProgressFill() {
    var candidate = null;
    Array.prototype.slice.call(document.querySelectorAll('div, span')).forEach(function (node) {
      var rect = node.getBoundingClientRect();
      if (rect.width < 20 || rect.height < 6 || rect.height > 28) return;

      if (bg.indexOf('22, 163, 74') !== -1 || bg.indexOf('18, 148, 71') !== -1 || bg.indexOf('16, 185, 129') !== -1) candidate = node;
    });
    if (candidate) candidate.classList.add('quiz-progress-fill');
    return candidate;
  }

  function animateProgressThenGo() {
    var percentNode = findPercentNode();
    var target = percentNode ? parseInt(percentNode.textContent, 10) : 100;
    if (!target || target < 1) target = 100;
    var fill = findProgressFill();
    var start = performance.now();
    var duration = 2100;
    if (fill) fill.style.width = '0%';
    if (percentNode) percentNode.textContent = '0%';
    function tick(now) {
      var progress = Math.min(1, (now - start) / duration);
      var eased = 1 - Math.pow(1 - progress, 2.2);
      var value = Math.round(eased * target);
      if (fill) fill.style.width = value + '%';
      if (percentNode) percentNode.textContent = value + '%';
      if (progress < 1) requestAnimationFrame(tick); else setTimeout(function () { if(window.spaGoToNext) { window.spaGoToNext(nextStep); } else { goToNext(null); } }, 550);
    }
    requestAnimationFrame(tick);
  }

  function animateBmiCircle() {
    if (!/0def5fca/.test(getPathname())) return;
    var fills = Array.prototype.slice.call(document.querySelectorAll('div')).filter(function (node) {
      return (window.getComputedStyle(node).backgroundImage || '').indexOf('conic-gradient') !== -1;
    });
    var fill = fills.find(function (node) {
      var rect = node.getBoundingClientRect();
      return rect.width >= 90 && rect.height >= 90;
    }) || fills[0];
    if (!fill) return;
    var circle = fill.closest('.relative') || fill.parentElement;
    if (!circle) return;
    var label = Array.prototype.slice.call(circle.querySelectorAll('span, div')).filter(function (node) {
      return /^\s*\d+%\s*$/.test(node.textContent || '') && node !== fill;
    }).sort(function (a, b) {
      return (a.textContent || '').trim().length - (b.textContent || '').trim().length;
    })[0];
    if (!label) return;
    var match = (label.textContent || '').match(/\d+/);
    var target = match ? Number(match[0]) : 87;
    var start = performance.now();
    var duration = 1700;
    function tick(now) {
      var progress = Math.min(1, (now - start) / duration);
      var eased = 1 - Math.pow(1 - progress, 2.4);
      var value = Math.round(eased * target);
      label.textContent = value + '%';
      fill.style.backgroundImage = 'conic-gradient(rgba(75,249,1,0.75) 0%, rgb(255,0,0) ' + value + '%, rgb(229,231,235) 0deg)';
      if (progress < 1) requestAnimationFrame(tick);
    }
    label.textContent = '0%';
    fill.style.backgroundImage = 'conic-gradient(rgba(75,249,1,0.75) 0%, rgb(255,0,0) 0%, rgb(229,231,235) 0deg)';
    requestAnimationFrame(tick);
  }
  function wireClicks() {
