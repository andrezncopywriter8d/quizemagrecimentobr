    var continueButton = Array.prototype.slice.call(document.querySelectorAll('button')).find(isAdvanceButton);
    var wrapper = continueButton || null;
    while (wrapper && wrapper.parentElement && wrapper.parentElement !== main) wrapper = wrapper.parentElement;
    var card = document.createElement('div');

    card.innerHTML = '<div><div class="quiz-video-title">VocÃª jÃ¡ comeÃ§ou a assistir esse vÃ­deo</div><div class="quiz-video-action"><span class="quiz-video-icon">â–¶</span><span>Continuar assistindo?</span></div><div class="quiz-video-action"><span class="quiz-video-icon">â†»</span><span>Assistir do inÃ­cio?</span></div></div>';
    var insertBeforeNode = headingBlock && headingBlock.nextSibling ? headingBlock.nextSibling : wrapper;

  function installFinalVideo() {
    if (!/f01fe99f/.test(getPathname())) return;

    var insertBeforeNode = headingBlock && headingBlock.nextSibling ? headingBlock.nextSibling : null;
    var dream = sessionStorage.getItem('quizDream') || sessionStorage.getItem('quizLastOption') || '';
    if (dream) {

    var card = document.createElement('div');
    card.className = 'quiz-video-card quiz-video-card--black';
    card.innerHTML = '<div class="quiz-video-overlay"><div class="quiz-video-title">Seu vÃ­deo jÃ¡ comeÃ§ou</div><div class="quiz-video-action"><span class="quiz-video-icon">â–¶</span><span>Clique para ouvir</span></div></div>';

  function findPercentNode() {
    return Array.prototype.slice.call(document.querySelectorAll('div, span, strong, p')).find(function (node) { return /^\s*\d{1,3}%\s*$/.test(node.textContent || ''); });
  }

  function findProgressFill() {
    var candidate = null;
    Array.prototype.slice.call(document.querySelectorAll('div, span')).forEach(function (node) {
      var rect = node.getBoundingClientRect();
      if (rect.width < 20 || rect.height < 6 || rect.height > 28) return;
      var bg = window.getComputedStyle(node).backgroundColor || '';
      if (bg.indexOf('22, 163, 74') !== -1 || bg.indexOf('18, 148, 71') !== -1 || bg.indexOf('16, 185, 129') !== -1) candidate = node;
    });
    if (candidate) candidate.classList.add('quiz-progress-fill');
    return candidate;
  }

  function animateProgressThenGo() {
    var percentNode = findPercentNode();
    var target = percentNode ? parseInt(percentNode.textContent, 10) : 100;
    if (!target || target < 1) target = 100;
    var fill = findProgressFill();
    var start = performance.now();
    var duration = 2100;
    if (fill) fill.style.width = '0%';
    if (percentNode) percentNode.textContent = '0%';
    function tick(now) {
      var progress = Math.min(1, (now - start) / duration);
      var eased = 1 - Math.pow(1 - progress, 2.2);
      var value = Math.round(eased * target);
      if (fill) fill.style.width = value + '%';
      if (percentNode) percentNode.textContent = value + '%';
      if (progress < 1) requestAnimationFrame(tick); else setTimeout(function () { if(window.spaGoToNext) { window.spaGoToNext(nextStep); } else { goToNext(null); } }, 550);
    }
    requestAnimationFrame(tick);
  }

  function animateBmiCircle() {
    if (!/0def5fca/.test(getPathname())) return;
    var fills = Array.prototype.slice.call(document.querySelectorAll('div')).filter(function (node) {
      return (window.getComputedStyle(node).backgroundImage || '').indexOf('conic-gradient') !== -1;
    });
    var fill = fills.find(function (node) {
      var rect = node.getBoundingClientRect();
      return rect.width >= 90 && rect.height >= 90;
    }) || fills[0];
    if (!fill) return;
    var circle = fill.closest('.relative') || fill.parentElement;
    if (!circle) return;
    var label = Array.prototype.slice.call(circle.querySelectorAll('span, div')).filter(function (node) {
      return /^\s*\d+%\s*$/.test(node.textContent || '') && node !== fill;
    }).sort(function (a, b) {
      return (a.textContent || '').trim().length - (b.textContent || '').trim().length;
    })[0];
    if (!label) return;
    var match = (label.textContent || '').match(/\d+/);
    var target = match ? Number(match[0]) : 87;
    var start = performance.now();
    var duration = 1700;
    function tick(now) {
      var progress = Math.min(1, (now - start) / duration);
      var eased = 1 - Math.pow(1 - progress, 2.4);
      var value = Math.round(eased * target);
      label.textContent = value + '%';
      fill.style.backgroundImage = 'conic-gradient(rgba(75,249,1,0.75) 0%, rgb(255,0,0) ' + value + '%, rgb(229,231,235) 0deg)';
      if (progress < 1) requestAnimationFrame(tick);
    }
    label.textContent = '0%';
    fill.style.backgroundImage = 'conic-gradient(rgba(75,249,1,0.75) 0%, rgb(255,0,0) 0%, rgb(229,231,235) 0deg)';
    requestAnimationFrame(tick);
  }
  function wireClicks() {
    document.addEventListener('click', function (event) {
      var button = event.target.closest && event.target.closest('button');
      if (!button) return;
      if (isAuxiliaryButton(button)) return;
      if (isAdvanceButton(button)) {
        event.preventDefault();
        goToNext(button);
        return;
      }
      markSelected(button);
      if (!hasAdvanceButton()) {
        event.preventDefault();
        setTimeout(function () { goToNext(button); }, 120);
      }
    }, clickListenerOptions);
  }

  document.documentElement.classList.add('quiz-step-entering');
  enhanceCards();
  enhanceBodyMap();
  enhanceRuler();
  installAmandaVideo();
  installFinalVideo();
  decorateComparisonChoice();
  animateBmiCircle();
  wireClicks();
  if (autoAdvance) animateProgressThenGo();

  window.enhanceCards = typeof enhanceCards !== 'undefined' ? enhanceCards : null;
  window.enhanceBodyMap = typeof enhanceBodyMap !== 'undefined' ? enhanceBodyMap : null;
  window.enhanceRuler = typeof enhanceRuler !== 'undefined' ? enhanceRuler : null;
  window.decorateComparisonChoice = typeof decorateComparisonChoice !== 'undefined' ? decorateComparisonChoice : null;
  window.animateBmiCircle = typeof animateBmiCircle !== 'undefined' ? animateBmiCircle : null;
  window.installAmandaVideo = typeof installAmandaVideo !== 'undefined' ? installAmandaVideo : null;
  window.installFinalVideo = typeof installFinalVideo !== 'undefined' ? installFinalVideo : null;

})();
